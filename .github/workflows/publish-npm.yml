name: Release @revolt-rai/js to npm

on:
  release:
    types:
      - created
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify dist has content
        run: |
          test -f dist/index.js || (echo "dist/index.js missing — build failed" && exit 1)
          test -f dist/client.js || (echo "dist/client.js missing" && exit 1)
          echo "dist/ content:"
          ls dist/

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
